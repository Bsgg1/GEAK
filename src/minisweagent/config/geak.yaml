agent:
  step_limit: 0.
  cost_limit: 0.
  mode: confirm
  use_skills: True
env:
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: 'off'
    TQDM_DISABLE: '1'
  timeout: 3600
model:
  model_class: amd_llm
  # claude-opus-4.8, claude-opus-4.7, claude-opus-4.6, claude-sonnet-4.5, gpt-5.1, gpt-5, gpt-5-codex
  model_name: claude-opus-4.8
  api_key: ""
  model_kwargs:
    temperature: 0.0
    max_tokens: 16000
    # reasoning is only valid for gpt models, can be set to none, low, medium, high
    reasoning:
      effort: high
    # text is only valid for gpt models, can be set to low or high. determines how many output tokens are generated
    text:
      verbosity: low
tools:
  profile_kernel: false
  profiling_type: profiling
  rag: false
run:
  # Wall-clock budget knobs for `geak --mode quick|full`.
  # Mode controls only time + max_rounds; step/cost limits remain user-controlled
  # via CLI flags (--cost-limit) and existing GEAK_* env vars. See run/budget.py.
  mode: full
  budgets:
    quick:
      total_s: 3600              # 1 hour total wall-clock
      preprocess_soft_cap_s: 900 # 15 min target; can borrow up to hard cap
      preprocess_hard_cap_fraction: 0.5  # -> 1800 s ceiling
      finalize_grace_s: 300      # 5 min reserved at end of opt for clean finalize
      kill_buffer_s: 360         # forced os._exit() this long after opt_deadline
    full:
      total_s: 7200              # 2 hours total wall-clock
      preprocess_soft_cap_s: 900
      preprocess_hard_cap_fraction: 0.5  # -> 3600 s ceiling
      finalize_grace_s: 300
      kill_buffer_s: 360
  presets:
    # Mode-driven overrides (deep-merged into top-level config). Deliberately
    # contains NO env: block -- mode does not touch step/cost/iteration limits.
    quick:
      orchestrator:
        max_rounds: 2
    full:
      orchestrator:
        max_rounds: 5
parallel:
  num_parallel: null              # null -> ceil(len(gpu_ids) * gpu_oversubscribe)
  gpu_oversubscribe: 1.0          # bump to 2.0 once stats validate headroom
  max_concurrent_llm: null        # null -> num_parallel
gpu_manager:
  job_timeout_default_s: 900
  stats_log_interval_s: 30        # 0 disables periodic stats logging
pipeline:
  mode: mixed
