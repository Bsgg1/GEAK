site_name: GEAK documentation
site_description: GEAK v3 — GPU kernel optimization (internal docs)
repo_url: https://github.com/AMD-AGI/GEAK

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-auto
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep orange
      media: "(prefers-color-scheme: dark)"
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.footer
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - tables

nav:
  - Home: index.md
  - Quick start: quick_start.md
  - Configuration files: configuration.md
  - API reference: api_reference.md
  - Development guidelines: development_guidelines.md
  - Developer guide:
      - Overview: developer/index.md
      - System & instance prompts: developer/prompts.md
      - MCP and native tools: developer/mcp-tools.md
  - Compatibility matrix: compatibility.md
  - ROCm environment: env_install.md
  - RAG sub-agent: subagent_guide.md

plugins:
  - search
