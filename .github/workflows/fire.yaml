name: Smoke Test

on:
  workflow_dispatch:

jobs:
  smoke:
    name: GEAK smoke test (silu kernel)
    runs-on: geak-benchmark-5kh27
    timeout-minutes: 60

    env:
      AMD_LLM_API_KEY: ${{ secrets.AMD_LLM_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install GEAK
        run: pip install -e '.[full]'

      - name: Verify CLI
        run: geak --help

      - name: Prepare workspace
        run: |
          WORK=/tmp/geak-smoke-$$
          echo "SMOKE_DIR=$WORK" >> "$GITHUB_ENV"
          mkdir -p "$WORK"
          cp -r tests/test_data/smoke_kernel/silu/* "$WORK/"

      - name: Verify kernel compiles
        working-directory: ${{ env.SMOKE_DIR }}
        run: |
          make
          ./applications_silu

      - name: Run GEAK optimization
        working-directory: ${{ env.SMOKE_DIR }}
        run: |
          geak \
            -c geak \
            --repo "$SMOKE_DIR" \
            --yolo \
            --exit-immediately \
            --max-rounds 1 \
            --no-heterogeneous \
            -t "Optimize the silu_mul_kernel in silu.hip for better performance on AMD MI300X. The kernel computes SiLU activation (x * sigmoid(x)) fused with element-wise multiplication on bf16 data."

      - name: Verify output
        run: |
          echo "=== Smoke test completed ==="
          if [ -f "$SMOKE_DIR/output.traj.json" ]; then
            echo "Trajectory file found"
          fi
          ls -la "$SMOKE_DIR"/optimization_logs/*/best_results.json 2>/dev/null && \
            echo "Best results found" || true
          echo "=== Smoke test PASSED ==="

      - name: Cleanup
        if: always()
        run: rm -rf "$SMOKE_DIR"
