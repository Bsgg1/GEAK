name: Secret Scan

on:
  push:
    branches:
      - main
      - dev-working
      - "release/**"
  pull_request:
    branches:
      - main
      - dev-working
      - "release/**"

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Scan for hardcoded secrets
        run: |
          FOUND=0

          # API key patterns: provider prefix + long alphanumeric string
          PATTERNS=(
            'sk-[a-zA-Z0-9]{20,}'           # OpenAI / Anthropic
            'sk-ant-[a-zA-Z0-9_-]{20,}'     # Anthropic
            'AKIA[0-9A-Z]{16}'              # AWS access key
            'ghp_[a-zA-Z0-9]{36}'           # GitHub personal token
            'gho_[a-zA-Z0-9]{36}'           # GitHub OAuth token
            'ghs_[a-zA-Z0-9]{36}'           # GitHub app token
            'glpat-[a-zA-Z0-9_-]{20,}'      # GitLab token
            'xoxb-[0-9]{10,}-[a-zA-Z0-9]+'  # Slack bot token
          )

          # File extensions to scan
          INCLUDES="--include=*.py --include=*.yaml --include=*.yml --include=*.json --include=*.toml --include=*.cfg --include=*.env --include=*.sh --include=*.md"

          # Directories to skip
          EXCLUDES="--exclude-dir=.git --exclude-dir=node_modules --exclude-dir=__pycache__"

          for pat in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rPn $INCLUDES $EXCLUDES "$pat" . 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::Potential secret detected (pattern: $pat):"
              echo "$MATCHES"
              FOUND=1
            fi
          done

          # Check for generic key assignment patterns (high-entropy values)
          GENERIC_MATCHES=$(grep -rPn $INCLUDES $EXCLUDES \
            '(api[_-]?key|secret[_-]?key|access[_-]?token|private[_-]?key)\s*[:=]\s*["\x27][a-zA-Z0-9/+]{20,}["\x27]' \
            . 2>/dev/null | grep -v 'secrets\.' | grep -v '\${{' | grep -v 'example' | grep -v 'placeholder' | grep -v 'your_' | grep -v 'TODO' || true)
          if [ -n "$GENERIC_MATCHES" ]; then
            echo "::error::Potential hardcoded credential found:"
            echo "$GENERIC_MATCHES"
            FOUND=1
          fi

          # Check for hex API keys (e.g. 65481c6913004dafb08eee42587844c0) assigned to key/token/secret variables
          HEX_MATCHES=$(grep -rPn $INCLUDES $EXCLUDES \
            '(key|token|secret|password|credential|api_key|API_KEY|LLM_API)\s*[:=]\s*["\x27][0-9a-fA-F]{28,40}["\x27]' \
            . 2>/dev/null | grep -v 'secrets\.' | grep -v '\${{' | grep -v 'example' | grep -v 'placeholder' | grep -v 'your_' | grep -v 'commit' || true)
          if [ -n "$HEX_MATCHES" ]; then
            echo "::error::Potential hex API key found:"
            echo "$HEX_MATCHES"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "=========================================="
            echo "SECRETS DETECTED — commit blocked."
            echo "Use environment variables or GitHub Secrets instead."
            echo "=========================================="
            exit 1
          fi

          echo "No secrets found."
