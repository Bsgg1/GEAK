name: Preprocess Tests

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on:
  push:
    branches:
      - main
      - dev
      - "release/**"
    paths-ignore:
      - "docs/**"
      - "knowledge-base/**"
      - "README.md"
      - ".cursor/**"
      - ".github/workflows/pylint.yaml"
      - ".github/workflows/lint.yaml"
      - ".github/workflows/pytest.yaml"
  pull_request:
    branches:
      - main
      - dev
      - "release/**"
    paths-ignore:
      - "docs/**"
      - "knowledge-base/**"
      - "README.md"
      - ".cursor/**"
      - ".github/workflows/pylint.yaml"
      - ".github/workflows/lint.yaml"
      - ".github/workflows/pytest.yaml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv pip install --python ${Python_ROOT_DIR} -e . pytest

      - name: Run preprocess unit tests
        run: PYTHONPATH=src:mcp_tools/automated-test-discovery/src pytest tests/run/test_preprocess_unit.py -v --noconftest
