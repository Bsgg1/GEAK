# GEAK v3 preprocessing test plan — HIP sweep (3 kernels, 5 scenarios + escalation).
#
# Loaded by ``scripts/preprocess_v3_test_runner.py``. Each entry under
# ``kernels`` describes one AKA HIP kernel target and the scenarios the
# runner should drive against it. The runner spawns a child process per
# (scenario.kind, run-index) pair; the child invokes the v3 orchestrator
# in-process (NOT via ``geak`` subprocess — see runner module docstring
# for rationale) and dumps PreprocessResult + agent transcript + every
# orchestrator artefact to disk. The parent then runs assertions against
# the on-disk dumps and rolls them up into ``summary.json``.
#
# Five scenario kinds are exercised by the YAML; the runner derives two
# additional records by piggybacking on run1 of ``path_b_determinism``:
#   * ``path_b_coverage`` — harness shape signatures vs oracle shapes.
#   * ``cross_language`` — HIP-canonical markers in the run transcript.
#
# Ground-truth shapes are extracted by ``preprocess_v3_oracle.py`` from
# each kernel's ``scripts/task_runner.py::TEST_SHAPES``; see that module
# for the AST-level extraction policy.
#
# Verifier escalation is wired ONLY on ``ball_query`` because its
# wrapper has the cleanest entry-function symbol (``BallQuery.forward``)
# to rename in a fixture without disturbing the rest of the build.

kernels:
  # =========================================================================
  # ball_query — MMCV-style autograd.Function wrapper around HIP via pybind.
  # Ground truth: 5 (B, N, M, max_radius, nsample) shapes, integer prefix
  # (B, N, M) is the comparable signature.
  # =========================================================================
  - name: ball_query
    enabled: true
    repo_path: /home/upandey/AgentKernelArena
    task_dir_relative: tasks/hip2hip/others/ball_query
    kernel_path: /home/upandey/AgentKernelArena/tasks/hip2hip/others/ball_query/ball_query_wrapper.py
    ground_truth_extractor: aka_others
    scenarios:
      - kind: path_a
        enabled: true
        # The runner builds the task body from the kernel's repo_path; we
        # only declare the substring we expect in the rendered COMMANDMENT.md
        # so the assertion stays decoupled from any minor task-string drift.
        expect_command_substring: "python3 scripts/task_runner.py performance"
      - kind: path_a_partial
        enabled: true
        expect_partial_modes: ["correctness", "full_benchmark", "profile"]
      - kind: path_b_determinism
        enabled: true
        runs: 3
      - kind: task_override
        enabled: true
        # Picked from TEST_SHAPES[1] = (4, 1024, 128, 0.5, 10); the runner
        # asserts against the integer-prefix signature (4, 1024, 128).
        expect_shape: [4, 1024, 128]
      - kind: verifier_escalation
        enabled: true
        # Throwaway copy of ball_query with BallQuery.forward renamed so the
        # harness-generator can't import it; assert the verifier loop fires
        # at least once before the orchestrator records the failure. The
        # fixture is built as part of the smoke step (NOT committed; lives
        # under validation_runs/ which is gitignored).
        kernel_path_override: validation_runs/escalation_fixture/ball_query/ball_query_wrapper.py
        repo_path_override: validation_runs/escalation_fixture/ball_query
        min_verifier_rejections: 1

  # =========================================================================
  # matrix_multiplication — standalone .hip binary, fp32 GEMM, Makefile build.
  # Ground truth: 5 (A_rows, A_cols, B_cols) tuples; the whole tuple is the
  # signature (no kernel-config columns).
  # =========================================================================
  - name: matrix_multiplication
    enabled: true
    repo_path: /home/upandey/AgentKernelArena
    task_dir_relative: tasks/hip2hip/others/matrix_multiplication
    kernel_path: /home/upandey/AgentKernelArena/tasks/hip2hip/others/matrix_multiplication/main.hip
    ground_truth_extractor: aka_others
    scenarios:
      - kind: path_a
        enabled: true
        expect_command_substring: "python3 scripts/task_runner.py performance"
      - kind: path_a_partial
        enabled: true
        expect_partial_modes: ["correctness", "full_benchmark", "profile"]
      - kind: path_b_determinism
        enabled: true
        runs: 3
      - kind: task_override
        enabled: true
        # Picked from TEST_SHAPES[2] = (1024, 512, 1024).
        expect_shape: [1024, 512, 1024]

  # =========================================================================
  # silu — standalone .hip binary, bf16 fused elementwise (silu * mul).
  # Ground truth: 5 (B, H) tuples; signature == full tuple.
  # =========================================================================
  - name: silu
    enabled: true
    repo_path: /home/upandey/AgentKernelArena
    task_dir_relative: tasks/hip2hip/others/silu
    kernel_path: /home/upandey/AgentKernelArena/tasks/hip2hip/others/silu/silu.hip
    ground_truth_extractor: aka_others
    scenarios:
      - kind: path_a
        enabled: true
        expect_command_substring: "python3 scripts/task_runner.py performance"
      - kind: path_a_partial
        enabled: true
        expect_partial_modes: ["correctness", "full_benchmark", "profile"]
      - kind: path_b_determinism
        enabled: true
        runs: 3
      - kind: task_override
        enabled: true
        # Picked from TEST_SHAPES[2] = (2048, 4096).
        expect_shape: [2048, 4096]
